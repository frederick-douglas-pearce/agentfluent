# AgentFluent glossary -- structured source of truth.
#
# Edit this file to add, remove, or update glossary terms. Then run:
#     python scripts/generate_glossary_md.py
# to regenerate docs/GLOSSARY.md. The pytest drift check
# (tests/unit/glossary/test_drift.py) fails CI if these are out of sync.
#
# Schema is defined in src/agentfluent/glossary/models.py
# (GlossaryEntry). Categories are a closed Literal -- a typo will fail
# load. Cross-references in `related` must point at another entry's
# canonical `name`.

# =============================================================================
# Token types
# =============================================================================

- name: input
  category: token_type
  short: Tokens read from the prompt that aren't served from a cache.
  long: |
    Charged at the model's standard input rate. Every API call accrues some
    `input` tokens -- the system prompt, the latest user turn, and any newly
    appended context that didn't exist in the prior cached prefix. Sustained
    high `input` ratios (vs. `cache_read`) on long sessions usually indicate
    the prompt prefix is changing in ways that defeat caching.
  example: "agentfluent analyze reports `Input tokens: 12,840` per session."
  related: [cache_read, cache_efficiency]

- name: output
  category: token_type
  short: Tokens generated by the model.
  long: |
    Charged at the model's standard output rate (typically 5x the input
    rate). Output is the only token category Claude bills for *generating*;
    all others bill for *reading* tokens that were already in the prompt.
    High output ratios usually mean the agent is producing long-form content
    (code generation, prose, structured tool calls); low ratios with high
    spend mean prompt-side cost dominates.
  example: "Output tokens: 8,420 in the analyze table."
  related: [total_cost]

- name: cache_creation
  category: token_type
  short: Tokens written to the prompt cache for later reuse.
  long: |
    Charged at 1.25x the input rate (the 5-minute TTL tier). Pays the
    upfront cost so subsequent calls within the cache window can read the
    same prefix at the heavily-discounted `cache_read` rate (~10% of input).
    First call in a session typically writes; later calls read. A
    `cache_creation` spike on a session that should be re-using a stable
    prefix indicates cache invalidation -- usually because the system prompt
    or early turns are changing.

    What's typically in the cached prefix: the system prompt scaffold, tool
    definitions, and `CLAUDE.md` content all land in the cached side on a
    typical Claude Code session. The first turn writes them; every
    subsequent turn within the cache window reads them. Anything that
    *changes* on every turn (the conversation history) is on the
    non-cached side.

    Cache-invalidation triggers that push these tokens back to
    `cache_creation`:

    - TTL expires (default 5-minute gap between turns)
    - `CLAUDE.md` is edited mid-session
    - Any earlier prefix bytes change (rare for `CLAUDE.md`, which sits
      near the front)
  example: |
    Cache creation tokens: 14,450 on the first call of a long session;
    0 on subsequent calls until the cache TTL expires or the prefix changes.
  related: [cache_read, cache_efficiency]

- name: cache_read
  category: token_type
  short: Tokens read from the prompt cache.
  long: |
    Charged at 10% of the input rate (the heavily-discounted tier). This is
    the dominant token category by volume on long sessions and the reason
    cached agents are 10-20x cheaper than uncached. The `cache_efficiency`
    metric (`cache_read / total_input`) tells you what fraction of every
    prompt is hitting the cache; ratios below ~80% on long sessions warrant
    investigation.

    What you're reading from cache: the system prompt scaffold, tool
    definitions, and `CLAUDE.md` content (whatever was written by the prior
    turn's `cache_creation`). Each subsequent turn reads the same prefix
    bytes from cache instead of re-paying the full input rate.

    Why `cache_efficiency` drops on a long session: the cache TTL (default
    5 minutes) expired between turns, or `CLAUDE.md` was edited, or some
    earlier prefix byte changed. Each invalidation forces the next turn to
    write `cache_creation` tokens before any `cache_read` resumes.
  example: |
    Cache read tokens: 1,234,567 -- the hot path on a session that's been
    running for an hour.
  related: [cache_creation, cache_efficiency]

- name: cache_efficiency
  category: token_type
  short: |
    Fraction of input tokens served from the prompt cache
    (cache_read / total_input).
  long: |
    A derived metric AgentFluent reports per session. Higher is better.
    Long sessions on a stable prefix typically reach 0.85-0.95. Ratios
    below ~0.80 usually point at cache invalidation (TTL expiry, prefix
    edits, or fast-changing system prompt) and merit a look at where the
    `cache_creation` cost is concentrated.
  related: [cache_read, cache_creation, input]

- name: total_cost
  category: token_type
  short: Estimated dollar cost across all token categories for the session.
  long: |
    Computed by multiplying each token category by its per-million-token
    rate (see `pricing.py`). Output tokens typically dominate per-call
    cost; cache_read tokens dominate by volume on long sessions. Reported
    in USD, two decimals.
  related: [output, cache_read]

# =============================================================================
# Signal types
# =============================================================================

- name: token_outlier
  category: signal_type
  short: |
    An invocation consumes far more tokens per tool call than the agent's
    typical run.
  long: |
    Triggered when `tokens_per_tool_use` exceeds the Tukey IQR threshold:
    `Q3 + 1.5 × IQR` of the per-agent-type distribution (where Q3 is
    the 75th percentile and IQR = Q3 - Q1). Computed across all
    invocations of the same agent type within the analyzed sessions;
    detection requires at least `OUTLIER_MIN_SAMPLE` invocations (4)
    and IQR > 0. Indicates the agent is over-fetching context,
    exploring unfocused, or being given an ambiguous prompt.

    The detection method is robust to right-skewed distributions
    (which agent token usage typically is), unlike a mean-ratio rule
    that gets pulled by its own outliers. The signal `detail` carries
    distribution context (`median_value`, `q3_value`, `iqr_value`,
    `p95_value`, `threshold_value`, `excess_iqrs`).
  example: "Agent 'Explore' has 40,288 tokens/tool_use, 7.2×IQR above Q3 of 5,064."
  severity_range: warning
  threshold: Q3 + 1.5 × IQR (Tukey rule), per-agent-type
  recommendation_target: prompt
  related: [duration_outlier, stuck_pattern, target_prompt]

- name: duration_outlier
  category: signal_type
  short: |
    An invocation takes far longer per tool call than the agent's typical run.
  long: |
    Same Tukey IQR threshold as `token_outlier` (`val > Q3 + 1.5 × IQR`)
    but on `active_duration_per_tool_use` -- wall-clock duration with
    detected idle gaps subtracted. Requires at least `OUTLIER_MIN_SAMPLE`
    invocations (4) and IQR > 0 in the per-agent-type distribution.
    Often co-occurs with `token_outlier`. When it appears alone, the
    agent is making slow tool calls (network latency, large file
    reads) rather than over-thinking.

    **Active vs wall-clock duration (#230).** When a tool call sits
    pending user approval -- the IDE prompts to allow a `Write`, an
    MCP call, etc., and the user is AFK -- the wall-clock duration
    inflates without any agent work happening. AgentFluent detects
    these idle periods per-trace
    (`gap > max(10 * median, 5 minutes)`) and exposes both
    `duration_ms` (raw wall-clock) and `active_duration_ms` (idle
    subtracted) on subagent traces. Outlier detection uses the
    active variant when a trace is linked, so an agent that "looked
    slow" only because the user was away no longer false-positive
    flags. When no trace is linked (older sessions), detection
    falls back to raw `duration_per_tool_use`. The Claude Code JSONL
    has no native marker for approval-pending state -- see
    `anthropics/claude-code#55240` for the upstream proposal that
    would replace the heuristic with structural detection.
  example: "Agent 'pm' has 45.2s/tool_use, 3.1×IQR above Q3 of 14.6s."
  severity_range: warning
  threshold: Q3 + 1.5 × IQR (Tukey rule), computed on active_duration_per_tool_use
  recommendation_target: prompt
  related: [token_outlier, model_mismatch]

- name: tool_error_sequence
  category: signal_type
  short: Consecutive tool calls inside a subagent trace returned errors.
  long: |
    Triggered by 2+ consecutive `is_error: true` results from the same
    subagent. Escalates to `critical` at 4+. Excludes errors already
    covered by `retry_loop` or `stuck_pattern` so the same evidence doesn't
    fire two signals. Indicates the agent is missing fallback instructions
    -- it ran into a wall and kept walking into it.
  example: "Subagent 'general-purpose' had 3 consecutive tool errors."
  severity_range: warning (2-3 errors); critical (4+)
  threshold: "2+ consecutive is_error: true"
  recommendation_target: prompt
  related: [retry_loop, stuck_pattern, permission_failure]

- name: retry_loop
  category: signal_type
  short: A subagent retried the same tool 3+ times in a row.
  long: |
    Triggered by a `RetrySequence` with `attempts >= 3` that doesn't
    qualify as `stuck_pattern`. Indicates missing error-recovery guidance
    -- the agent is correctly identifying failure but doesn't know what to
    try differently. The retries may eventually succeed, in which case
    `eventual_success: true` is recorded in the signal detail.
  example: "Subagent 'architect' retried tool 'Read' 5 times."
  severity_range: warning
  threshold: attempts >= 3
  recommendation_target: prompt
  related: [stuck_pattern, tool_error_sequence]

- name: stuck_pattern
  category: signal_type
  short: |
    A subagent retried the same tool with **identical input** 4+ times --
    the most severe retry signal.
  long: |
    Triggered when 4+ retry attempts share byte-identical `input_summary`.
    The agent isn't varying its approach between attempts; it's stuck in a
    loop. Emits `critical` because nothing the agent can do will recover
    without prompt-level intervention.
  example: |
    Subagent 'Explore' repeated tool 'Bash' with identical input 6 times
    without progress.
  severity_range: critical
  threshold: 4+ retries with identical input
  recommendation_target: prompt
  related: [retry_loop]

- name: permission_failure
  category: signal_type
  short: A tool result contained a permission-denied keyword.
  long: |
    Triggered when a subagent tool result matches one of: `permission
    denied`, `access denied`, `not allowed`, `blocked`. Emitted once per
    unique tool denied (not per call), so the recommendation maps to a
    single config change ("grant tool X"). Cross-cuts with
    `tool_error_sequence` -- both fire from the same evidence -- because
    the remediation surfaces are different (tool config vs. prompt
    fallback).

    **False-positive filter.** Two structural patterns suppress emission
    even when the keyword matches: a leading line-number prefix
    (`<n>\t...` from Read or `<n>:...` from Grep — successful tool
    output where the keyword appears in source code, not as an error),
    and a result truncated at the 500-char summary cap (file content,
    not a denial message). Both fail open — preferring suppression to
    spurious denials.
  example: "Subagent 'pm' was denied access to tool 'Write' ('permission denied')."
  severity_range: critical
  threshold: "keyword match: permission denied / access denied / not allowed / blocked"
  recommendation_target: tools
  related: [error_pattern, target_tools]

- name: error_pattern
  category: signal_type
  short: Free-text error keywords detected in an invocation's final output.
  long: |
    Lower-fidelity than the trace-level signals above. Scans `output_text`
    for `blocked`, `permission denied`, `failed`, `error`, `retry`, `unable
    to`, `not found`, `timed out`. Suppressed for any agent type that
    already has a trace-level signal -- trace evidence is strictly more
    informative than a keyword scan.
  example: "Agent 'pm' output contains 'unable to'."
  severity_range: critical for permission-denied keywords; warning otherwise
  threshold: output_text keyword scan
  recommendation_target: prompt
  related: [permission_failure, tool_error_sequence]

- name: model_mismatch
  category: signal_type
  short: |
    An agent's declared model is wrong for the complexity of its observed
    work.
  long: |
    Per-agent-type signal. Compares the agent's declared model family
    (`current_model`) against a complexity classification computed from
    its mean tool calls, mean tokens, error rate, and write-tool usage.
    Emits `overspec` when a complex model is doing simple work (potential
    savings) or `underspec` when a simple model is doing complex work
    (potential failures). Only fires when the agent has 3+ invocations and
    declares a model in its `.claude/agents/X.md` frontmatter.
  example: |
    Agent 'pm' is overspec'd: classified 'simple' but uses claude-opus-4-7.
    Estimated savings $0.42 across 11 invocations by switching to
    claude-haiku-4-5.
  severity_range: warning
  threshold: complexity_tier mismatch with declared model; min 3 invocations
  recommendation_target: model
  related: [complexity_tier, overspec, underspec, target_model]

- name: mcp_unused_server
  category: signal_type
  short: An MCP server is configured but never called in observed sessions.
  long: |
    Triggered when an MCP server appears in `~/.claude.json` or
    `.mcp.json` but no tool calls reference it across the analyzed
    sessions. May be configured for projects you didn't analyze; consider
    the `info` severity. Cross-cutting signal -- `agent_type` is `null`
    since MCP servers aren't scoped to one agent.
  example: |
    MCP server 'slack' is configured in /home/u/.claude.json but has 0 tool
    calls across 10 analyzed sessions. Consider removing from mcpServers or
    marking as disabled.
  severity_range: info
  threshold: 0 calls across analyzed sessions
  recommendation_target: mcp
  related: [mcp_missing_server, target_mcp]

- name: mcp_missing_server
  category: signal_type
  short: An MCP server is called but not configured.
  long: |
    Triggered when observed tool calls reference an MCP server that isn't
    in any discovered MCP configuration. Often the result of a
    project-scoped server in a project you analyzed but is not the active
    project. Cross-cutting (`agent_type: null`).
  example: |
    Observed 5 calls to MCP server 'github' but it is not in any discovered
    MCP config. Add to ~/.claude.json or .mcp.json.
  severity_range: warning
  threshold: 1+ call to a non-configured server
  recommendation_target: mcp
  related: [mcp_unused_server, target_mcp]

- name: unused_agent
  category: signal_type
  short: |
    A custom agent is defined but the parent never delegates to it in the
    analyzed window.
  long: |
    Triggered when a custom `~/.claude/agents/<name>.md` (or project-scoped
    equivalent) is present in the config scanner output but `agent_type` has
    zero invocations across the analyzed sessions. Likely causes: the
    `description` doesn't match how the parent frames the task, the
    description is too narrow and only fires for an exact phrase, the
    triggering context (e.g., a failing test for a `tester` agent) isn't
    present in the window, or the parent has no awareness of the agent.
    Built-in agents (Explore, Plan, general-purpose, etc.) are excluded per
    D033 — their absence in any given window may be entirely normal. New
    agents added partway through the window will appear unused due to a
    partial-window confound; consider re-running after enough sessions
    accumulate.
  example: |
    Agent 'tester' is defined in /home/u/.claude/agents/tester.md but has 0
    invocations across 11 analyzed sessions.
  severity_range: info
  threshold: 0 invocations across analyzed sessions
  recommendation_target: description
  related: [target_description, mcp_unused_server]

- name: user_correction
  category: signal_type
  short: |
    The user interrupted or redirected the parent thread mid-flight ("no, do X
    instead", "wait, that's wrong", "revert").
  long: |
    Quality-axis signal (v0.6). High correction frequency in sessions
    without review subagents is evidence the parent would have benefited
    from independent review before committing to the wrong path.
    Detection uses a 3-tier heuristic to suppress false positives:

    1. **Strong-correction override** -- high-confidence phrases
       (`that's wrong`, `revert`, `undo`, `that's not what I`) fire
       regardless of preceding-message classification. These are
       corrections of reasoning, not answers to a question.
    2. **Primary gate** -- soft-correction patterns (negation,
       interruption, redirection, undo) only fire when the preceding
       assistant message contains a write-style `tool_use`. The user
       is correcting an *action*, not answering a question.
    3. **Question suppression** -- when the preceding assistant
       message ends with `?` AND has no write tools, soft patterns
       are suppressed (a "no" answer to "should I X?" is not a
       correction).

    Claude Code's system-injected wrappers (`<task-notification>`,
    `<system-reminder>`, session-resumption preamble, `Base directory
    for this skill:` skill metadata) are stripped before pattern
    matching to avoid trigger words inside non-prose content firing
    the signal. Calibrated against the dogfood corpus (#321, #330):
    post-fix false-positive rate is 0/2 detections.

    The signal `detail` carries the matched category (`strong` /
    `negation` / `interruption` / `redirection` / `undo`), the
    preceding-action classification (`write_tool` / `question` /
    `text_only`), the matched pattern, and a 140-char snippet.
  example: |
    User correction in parent thread: no, that's wrong -- we agreed
    not to delete anything in this pass.
  severity_range: warning
  threshold: |
    >= 2 corrections in the session OR correction rate >= 10% of user
    messages (OR-gated)
  recommendation_target: subagent
  related: [file_rework, reviewer_caught, primary_axis]

- name: file_rework
  category: signal_type
  short: |
    Same file edited at or above the calibrated threshold within a single
    session -- a missing-pre-implementation-review signal.
  long: |
    Quality-axis signal (v0.6). Heavy rework on one file in a single
    session usually indicates a feature shipped without a design pass
    that would have caught the structural issue earlier. Edit
    detection counts `Edit` / `Write` / `MultiEdit` calls against
    `file_path`; `Bash` and `NotebookEdit` are excluded by design (no
    clean `file_path` extraction).

    The signal `detail` carries `edit_count`, `post_completion_edits`
    (edits that landed after a completion-language phrase like
    "done" appeared in the session), `edit_tools` (which tools
    fired), and `completion_scope` (currently always `"session"` --
    per-file completion tracking is a future refinement).
  example: |
    File 'src/agentfluent/diagnostics/quality_signals.py' edited 14
    times in this session.
  severity_range: warning
  threshold: |
    `_FILE_REWORK_THRESHOLD` (currently 12) within a single session,
    calibrated to the p90 of the firing distribution
  recommendation_target: subagent
  related: [user_correction, reviewer_caught, primary_axis]

- name: reviewer_caught
  category: signal_type
  short: |
    A review-style subagent (architect, security-review, tester,
    code-reviewer) ran AND produced a substantive finding.
  long: |
    Quality-axis signal (v0.6). Per-agent attribution -- the signal
    carries the named review agent in `agent_type` so aggregation
    can group findings under each reviewer rather than lumping them
    globally. A review's response is "substantive" when the output
    is at least `_SUBSTANTIVE_RESPONSE_MIN_CHARS` (500) long AND
    mentions at least one finding-keyword (`blocker`, `issue`,
    `concern`, `must`, `should`, `warning`, `risk`, `vulnerability`,
    `fix`, `change needed`).

    The signal `detail` includes `finding_keywords` (the matched
    keywords, sorted), `parent_acted` (boolean), `response_length`
    (chars), `files_mentioned` (paths the review prose pointed at,
    extracted via a strict regex that excludes version strings and
    domain names), and `files_acted_on` (the subset of mentioned
    files the parent edited within the next
    `_PARENT_ACTED_WINDOW=15` assistant messages).

    `parent_acted` semantics (#322): review prose carries relative
    or bare paths (`src/foo.py` / `quality_signals.py`); `Edit` tool
    calls carry absolute paths (`/home/u/repo/src/foo.py`). The
    attribution uses suffix-match -- a mentioned token `m` matches
    an edited path `e` when `e == m` or `e.endswith("/" + m)` -- to
    bridge the relative-vs-absolute mismatch. Pre-fix this
    attribution was 0/51 on dogfood; post-fix 16/53 (30.2%).

    A per-(session, agent_type) rate gate
    (`MIN_REVIEWER_CAUGHT_RATE = 0.5`) suppresses noisy reviewers --
    review agents whose substantive-finding fraction within a
    session falls below the gate don't surface their findings as
    signals.
  example: "`architect` review surfaced 3 finding-keyword(s)."
  severity_range: info
  threshold: |
    Response >= 500 chars AND >= 1 finding keyword AND
    per-(session, agent_type) substantive rate >= MIN_REVIEWER_CAUGHT_RATE
  recommendation_target: subagent
  related: [user_correction, file_rework, primary_axis]

# =============================================================================
# Severity
# =============================================================================

- name: critical
  category: severity
  short: |
    A finding that almost certainly indicates broken behavior -- the agent
    failed or is stuck.
  long: |
    Reserved for `stuck_pattern`, `permission_failure`,
    `tool_error_sequence` runs of 4+ errors, and `error_pattern` matches
    on permission-denial keywords. Critical findings are sorted to the top
    of the Recommendations table and rendered red.
  related: [warning, info]

- name: warning
  category: severity
  short: A finding worth investigating but not necessarily broken.
  long: |
    The default severity for outliers, retries, and short error sequences.
    Warning findings often resolve on their own (e.g., a retry that
    eventually succeeded) but warrant attention if they recur. Rendered
    yellow.
  related: [critical, info]

- name: info
  category: severity
  short: A passive observation -- usually a config-quality note.
  long: |
    Used for `mcp_unused_server` and most config-rubric recommendations.
    These don't indicate runtime problems; they suggest hygiene
    improvements. Rendered cyan.
  related: [warning, critical]

# =============================================================================
# Confidence tier
# =============================================================================

- name: high
  category: confidence_tier
  short: |
    Cluster is large or cohesive enough to confidently propose as a new
    subagent.
  long: |
    Triggered when **cluster_size >= 10 OR cohesion_score >= 0.50**. The
    YAML draft is rendered without a "review before use" caveat -- the
    cluster has enough internal similarity to read as a coherent task
    family.
  related: [cohesion_score, cluster_size, medium, low]

- name: medium
  category: confidence_tier
  short: Cluster is real but borderline -- review before promoting.
  long: |
    Triggered when **cohesion_score >= 0.35** but neither high-tier
    threshold is met. The YAML draft is offered as a starting point; the
    suggested name and prompt should be reviewed before saving the agent.
  related: [high, low]

- name: low
  category: confidence_tier
  short: Cluster is loose; the proposed subagent draft needs rework.
  long: |
    Triggered when neither size nor cohesion thresholds are met. The YAML
    draft includes a `# REVIEW BEFORE USE -- low confidence cluster`
    comment. Use the cluster as evidence that *some* coherent subset of
    work exists, not as a finished proposal.
  related: [high, medium, cohesion_score]

# =============================================================================
# Recommendation target
# =============================================================================

- name: target_prompt
  category: recommendation_target
  short: |
    Edit the agent's prompt body -- the markdown content below the
    frontmatter in `.claude/agents/<name>.md`.
  long: |
    Used for signals that suggest the agent's *instructions* are the
    problem: token outliers (broad exploration), retry loops (missing
    recovery guidance), error sequences (missing fallback). For built-in
    agents (which have no editable prompt), the recommendation pivots to
    either a wrapper subagent or a tighter delegation prompt -- see
    `concern_scope` and `concern_recovery`.
  aliases: [prompt]
  related: [target_tools, target_model, target_mcp]

- name: target_tools
  category: recommendation_target
  short: |
    Edit the agent's `tools:` list in frontmatter (or the `disallowedTools:`
    list).
  long: |
    Used for `permission_failure` (the agent needs access to a tool it
    doesn't have) and for token outliers when the agent has too many
    tools to choose from (>8 -> recommendation forks to `tools`). For
    built-in agents, see `concern_tools`.
  related: [target_prompt, permission_failure, concern_tools]

- name: target_model
  category: recommendation_target
  short: Change the agent's `model:` field in frontmatter.
  long: |
    Used for `model_mismatch` signals. Recommends `claude-haiku-4-5` when
    overspec'd, `claude-sonnet-4-6` when underspec'd. For built-in agents
    (model not configurable), pivots to "create a custom subagent with the
    recommended model" -- see `concern_model`.
  related: [model_mismatch, complexity_tier, overspec, underspec, concern_model]

- name: target_mcp
  category: recommendation_target
  short: Edit MCP server configuration in `~/.claude.json` or `.mcp.json`.
  long: |
    Used for `mcp_unused_server` (remove or disable) and
    `mcp_missing_server` (add the configuration). MCP recommendations
    carry `agent_type: null` since MCP servers aren't scoped to a single
    agent.
  aliases: [mcp]
  related: [mcp_unused_server, mcp_missing_server]

- name: target_description
  category: recommendation_target
  short: |
    Rewrite the agent's `description:` field in frontmatter -- the trigger
    logic the parent reads when deciding to delegate.
  long: |
    The `description` field is the only configuration surface the parent
    thread sees when deciding whether to delegate to a subagent. A
    misaligned, too-narrow, or vague description is the most common
    reason a defined agent is never invoked. Used for `unused_agent`:
    the recommendation surfaces the current description verbatim so the
    user can compare against typical parent phrasing for the task. The
    fix is to broaden, sharpen, or rewrite the description; accepting
    that the agent is unused for the analyzed workload is also a valid
    outcome.
  aliases: [description]
  related: [unused_agent]

# =============================================================================
# Built-in agent concern
# =============================================================================

- name: concern_scope
  category: agent_concern
  short: The agent's task scope is too broad.
  long: |
    Used for `token_outlier` and `duration_outlier` on built-in agents.
    The recommendation suggests: (a) a custom wrapper subagent that
    narrows the task, (b) a tighter delegation prompt passed to the
    built-in, or (c) rerouting to a different agent.
  aliases: [scope]
  related: [concern_recovery, concern_tools, concern_model]

- name: concern_recovery
  category: agent_concern
  short: The agent lacks error-recovery instructions.
  long: |
    Used for `retry_loop`, `tool_error_sequence`, `error_pattern` on
    built-in agents. The recommendation suggests adding retry bounds or
    exit conditions to the *delegating* agent's prompt (since the
    built-in itself isn't editable), or wrapping the call in a custom
    subagent that owns recovery logic.
  aliases: [recovery]
  related: [concern_scope, concern_tools]

- name: concern_tools
  category: agent_concern
  short: The agent's fixed tool set is wrong for the task.
  long: |
    Used for `permission_failure` on built-in agents. Suggests routing
    the task to a custom subagent with explicit tool grants, or
    confirming the built-in's fixed tool set is actually required.
  related: [permission_failure, target_tools]

- name: concern_model
  category: agent_concern
  short: The agent's fixed model is the wrong tier.
  long: |
    Used for `model_mismatch` on built-in agents. Suggests creating a
    custom subagent with the recommended model or rerouting to an
    existing custom agent that uses it.
  related: [model_mismatch, target_model]

# =============================================================================
# Cluster metrics
# =============================================================================

- name: cohesion_score
  category: cluster_metric
  short: Mean pairwise cosine similarity within a cluster (0.0-1.0).
  long: |
    Higher is more coherent. Real-world delegation prompts have enough
    free-text variance that cohesion rarely exceeds 0.5 even for
    recognizable task families. Empirically calibrated thresholds (#167):
    **>= 0.50** = high confidence, **>= 0.35** = medium, below = low. The
    metric is mean-pairwise rather than centroid-distance because clusters
    of 5-10 invocations are sensitive to centroid placement.
  example: |
    cohesion_score: 0.42 on a five-invocation cluster about "PR review
    prompts" -- solidly medium-confidence.
  related: [cluster_size, high, medium, low]

- name: cluster_size
  category: cluster_metric
  short: Number of invocations grouped into a cluster.
  long: |
    Larger clusters are more reliable signals of a recurring task family.
    **>= 10 invocations** is the high-confidence threshold; below
    `--min-cluster-size` (default **5**) the cluster is suppressed
    entirely (not enough evidence).
  example: "cluster_size: 12 -- confident enough to propose a new subagent based on size alone."
  related: [cohesion_score, high, medium, low]

# =============================================================================
# Model routing
# =============================================================================

- name: complexity_tier
  category: model_routing
  short: A 3-level classification of an agent's task complexity.
  long: |
    Computed from observed mean tool calls, mean tokens, error rate, and
    write-tool usage. Tiers map 1:1 to Claude model families:

    - **`simple`** -- `claude-haiku` family. Triggered when mean tool calls
      <= 5 AND mean tokens <= 2,000 AND no write tools.
    - **`moderate`** -- `claude-sonnet` family. Default tier when neither
      simple nor complex thresholds are met.
    - **`complex`** -- `claude-opus` family. Triggered when mean tool calls
      >= 10 OR mean tokens >= 5,000 OR error rate >= 0.20 OR write tools used.

    Calibration note (#140): these thresholds are pending multi-contributor
    validation. On v0.3 single-dataset calibration, every observed agent
    classified as "complex" -- the thresholds may be set too sensitive.
  related: [overspec, underspec, model_mismatch]

- name: overspec
  category: model_routing
  short: |
    The agent uses a more capable (more expensive) model than its complexity
    warrants.
  long: |
    A `simple`-tier agent declared on `claude-opus-4-7`, for example. The
    `model_mismatch` signal recommends switching to the classified tier's
    family with an estimated cost savings derived from the observed token
    volume.
  related: [underspec, complexity_tier, model_mismatch]

- name: underspec
  category: model_routing
  short: The agent uses a less capable model than its complexity warrants.
  long: |
    A `complex`-tier agent declared on `claude-haiku-4-5`, for example.
    May correlate with elevated `error_rate` or `retry_loop` signals on
    the same agent. No cost-savings estimate (upgrading to a higher tier
    costs *more*); the recommendation is purely about output quality.
  related: [overspec, complexity_tier, model_mismatch]

# =============================================================================
# Built-in agent types
# =============================================================================

- name: general-purpose
  category: builtin_agent_type
  short: |
    The default delegation agent. Most recurring `general-purpose` invocations
    in your sessions are clustering candidates -- these are tasks that probably
    deserve their own custom subagent.
  long: |
    See **delegation clustering** in the README for how AgentFluent groups
    these into proposed new subagents.

- name: explore
  category: builtin_agent_type
  short: |
    Codebase exploration. Read-only by design. Frequent token outliers here
    usually mean the delegation prompt is too open-ended.
  aliases: [Explore]

- name: plan
  category: builtin_agent_type
  short: |
    Planning agent -- produces step-by-step implementation plans without
    modifying state.
  aliases: [Plan]

- name: code-reviewer
  category: builtin_agent_type
  short: PR / diff review agent.

- name: statusline-setup
  category: builtin_agent_type
  short: Configures the Claude Code statusline.

- name: claude-code-guide
  category: builtin_agent_type
  short: |
    Documentation lookup for Claude Code itself (hooks, settings, MCP, etc.).

