# AgentFluent glossary -- structured source of truth.
#
# Edit this file to add, remove, or update glossary terms. Then run:
#     python scripts/generate_glossary_md.py
# to regenerate docs/GLOSSARY.md. The pytest drift check
# (tests/unit/glossary/test_drift.py) fails CI if these are out of sync.
#
# Schema is defined in src/agentfluent/glossary/models.py
# (GlossaryEntry). Categories are a closed Literal -- a typo will fail
# load. Cross-references in `related` must point at another entry's
# canonical `name`.

# =============================================================================
# Token types
# =============================================================================

- name: input
  category: token_type
  short: Tokens read from the prompt that aren't served from a cache.
  long: |
    Charged at the model's standard input rate. Every API call accrues some
    `input` tokens -- the system prompt, the latest user turn, and any newly
    appended context that didn't exist in the prior cached prefix. Sustained
    high `input` ratios (vs. `cache_read`) on long sessions usually indicate
    the prompt prefix is changing in ways that defeat caching.
  example: "agentfluent analyze reports `Input tokens: 12,840` per session."
  related: [cache_read, cache_efficiency]

- name: output
  category: token_type
  short: Tokens generated by the model.
  long: |
    Charged at the model's standard output rate (typically 5x the input
    rate). Output is the only token category Claude bills for *generating*;
    all others bill for *reading* tokens that were already in the prompt.
    High output ratios usually mean the agent is producing long-form content
    (code generation, prose, structured tool calls); low ratios with high
    spend mean prompt-side cost dominates.
  example: "Output tokens: 8,420 in the analyze table."
  related: [total_cost]

- name: cache_creation
  category: token_type
  short: Tokens written to the prompt cache for later reuse.
  long: |
    Charged at 1.25x the input rate (the 5-minute TTL tier). Pays the
    upfront cost so subsequent calls within the cache window can read the
    same prefix at the heavily-discounted `cache_read` rate (~10% of input).
    First call in a session typically writes; later calls read. A
    `cache_creation` spike on a session that should be re-using a stable
    prefix indicates cache invalidation -- usually because the system prompt
    or early turns are changing.

    What's typically in the cached prefix: the system prompt scaffold, tool
    definitions, and `CLAUDE.md` content all land in the cached side on a
    typical Claude Code session. The first turn writes them; every
    subsequent turn within the cache window reads them. Anything that
    *changes* on every turn (the conversation history) is on the
    non-cached side.

    Cache-invalidation triggers that push these tokens back to
    `cache_creation`:

    - TTL expires (default 5-minute gap between turns)
    - `CLAUDE.md` is edited mid-session
    - Any earlier prefix bytes change (rare for `CLAUDE.md`, which sits
      near the front)
  example: |
    Cache creation tokens: 14,450 on the first call of a long session;
    0 on subsequent calls until the cache TTL expires or the prefix changes.
  related: [cache_read, cache_efficiency]

- name: cache_read
  category: token_type
  short: Tokens read from the prompt cache.
  long: |
    Charged at 10% of the input rate (the heavily-discounted tier). This is
    the dominant token category by volume on long sessions and the reason
    cached agents are 10-20x cheaper than uncached. The `cache_efficiency`
    metric (`cache_read / total_input`) tells you what fraction of every
    prompt is hitting the cache; ratios below ~80% on long sessions warrant
    investigation.

    What you're reading from cache: the system prompt scaffold, tool
    definitions, and `CLAUDE.md` content (whatever was written by the prior
    turn's `cache_creation`). Each subsequent turn reads the same prefix
    bytes from cache instead of re-paying the full input rate.

    Why `cache_efficiency` drops on a long session: the cache TTL (default
    5 minutes) expired between turns, or `CLAUDE.md` was edited, or some
    earlier prefix byte changed. Each invalidation forces the next turn to
    write `cache_creation` tokens before any `cache_read` resumes.
  example: |
    Cache read tokens: 1,234,567 -- the hot path on a session that's been
    running for an hour.
  related: [cache_creation, cache_efficiency]

- name: cache_efficiency
  category: token_type
  short: |
    Fraction of input tokens served from the prompt cache
    (cache_read / total_input).
  long: |
    A derived metric AgentFluent reports per session. Higher is better.
    Long sessions on a stable prefix typically reach 0.85-0.95. Ratios
    below ~0.80 usually point at cache invalidation (TTL expiry, prefix
    edits, or fast-changing system prompt) and merit a look at where the
    `cache_creation` cost is concentrated.
  related: [cache_read, cache_creation, input]

- name: total_cost
  category: token_type
  short: Estimated dollar cost across all token categories for the session.
  long: |
    Computed by multiplying each token category by its per-million-token
    rate (see `pricing.py`). Output tokens typically dominate per-call
    cost; cache_read tokens dominate by volume on long sessions. Reported
    in USD, two decimals.
  related: [output, cache_read]

# =============================================================================
# Signal types
# =============================================================================

- name: token_outlier
  category: signal_type
  short: |
    An invocation consumes far more tokens per tool call than the agent's
    typical run.
  long: |
    Triggered when `tokens_per_tool_use` exceeds the Tukey IQR threshold:
    `Q3 + 1.5 × IQR` of the per-agent-type distribution (where Q3 is
    the 75th percentile and IQR = Q3 - Q1). Computed across all
    invocations of the same agent type within the analyzed sessions;
    detection requires at least `OUTLIER_MIN_SAMPLE` invocations (4)
    and IQR > 0. Indicates the agent is over-fetching context,
    exploring unfocused, or being given an ambiguous prompt.

    The detection method is robust to right-skewed distributions
    (which agent token usage typically is), unlike a mean-ratio rule
    that gets pulled by its own outliers. The signal `detail` carries
    distribution context (`median_value`, `q3_value`, `iqr_value`,
    `p95_value`, `threshold_value`, `excess_iqrs`).
  example: "Agent 'Explore' has 40,288 tokens/tool_use, 7.2×IQR above Q3 of 5,064."
  severity_range: warning
  threshold: Q3 + 1.5 × IQR (Tukey rule), per-agent-type
  recommendation_target: prompt
  related: [duration_outlier, stuck_pattern, target_prompt]

- name: duration_outlier
  category: signal_type
  short: |
    An invocation takes far longer per tool call than the agent's typical run.
  long: |
    Same Tukey IQR threshold as `token_outlier` (`val > Q3 + 1.5 × IQR`)
    but on `active_duration_per_tool_use` -- wall-clock duration with
    detected idle gaps subtracted. Requires at least `OUTLIER_MIN_SAMPLE`
    invocations (4) and IQR > 0 in the per-agent-type distribution.
    Often co-occurs with `token_outlier`. When it appears alone, the
    agent is making slow tool calls (network latency, large file
    reads) rather than over-thinking.

    **Active vs wall-clock duration (#230).** When a tool call sits
    pending user approval -- the IDE prompts to allow a `Write`, an
    MCP call, etc., and the user is AFK -- the wall-clock duration
    inflates without any agent work happening. AgentFluent detects
    these idle periods per-trace
    (`gap > max(10 * median, 5 minutes)`) and exposes both
    `duration_ms` (raw wall-clock) and `active_duration_ms` (idle
    subtracted) on subagent traces. Outlier detection uses the
    active variant when a trace is linked, so an agent that "looked
    slow" only because the user was away no longer false-positive
    flags. When no trace is linked (older sessions), detection
    falls back to raw `duration_per_tool_use`. The Claude Code JSONL
    has no native marker for approval-pending state -- see
    `anthropics/claude-code#55240` for the upstream proposal that
    would replace the heuristic with structural detection.
  example: "Agent 'pm' has 45.2s/tool_use, 3.1×IQR above Q3 of 14.6s."
  severity_range: warning
  threshold: Q3 + 1.5 × IQR (Tukey rule), computed on active_duration_per_tool_use
  recommendation_target: prompt
  related: [token_outlier, model_mismatch]

- name: tool_error_sequence
  category: signal_type
  short: Consecutive tool calls inside a subagent trace returned errors.
  long: |
    Triggered by 2+ consecutive `is_error: true` results from the same
    subagent. Escalates to `critical` at 4+. Excludes errors already
    covered by `retry_loop` or `stuck_pattern` so the same evidence doesn't
    fire two signals. Indicates the agent is missing fallback instructions
    -- it ran into a wall and kept walking into it.
  example: "Subagent 'general-purpose' had 3 consecutive tool errors."
  severity_range: warning (2-3 errors); critical (4+)
  threshold: "2+ consecutive is_error: true"
  recommendation_target: prompt
  related: [retry_loop, stuck_pattern, permission_failure]

- name: retry_loop
  category: signal_type
  short: A subagent retried the same tool 3+ times in a row.
  long: |
    Triggered by a `RetrySequence` with `attempts >= 3` that doesn't
    qualify as `stuck_pattern`. Indicates missing error-recovery guidance
    -- the agent is correctly identifying failure but doesn't know what to
    try differently. The retries may eventually succeed, in which case
    `eventual_success: true` is recorded in the signal detail.
  example: "Subagent 'architect' retried tool 'Read' 5 times."
  severity_range: warning
  threshold: attempts >= 3
  recommendation_target: prompt
  related: [stuck_pattern, tool_error_sequence]

- name: stuck_pattern
  category: signal_type
  short: |
    A subagent retried the same tool with **identical input** 4+ times --
    the most severe retry signal.
  long: |
    Triggered when 4+ retry attempts share byte-identical `input_summary`.
    The agent isn't varying its approach between attempts; it's stuck in a
    loop. Emits `critical` because nothing the agent can do will recover
    without prompt-level intervention.
  example: |
    Subagent 'Explore' repeated tool 'Bash' with identical input 6 times
    without progress.
  severity_range: critical
  threshold: 4+ retries with identical input
  recommendation_target: prompt
  related: [retry_loop]

- name: parameter_retry
  category: signal_type
  short: |
    A subagent retried the same tool with a **different parameter shape**
    after an initial error -- it's guessing at the input format.
  long: |
    Trace-level signal (Tier A). Triggered when 2+ consecutive calls to
    the same tool show (a) the first call errored (`is_error`, or a
    validation keyword -- `invalid`, `validation`, `missing required`,
    `type error`, `schema` -- in the leading window of the result) AND
    (b) the `input` shape changed between attempts. Shape change is
    measured primarily by the set of top-level keys (a key added,
    removed, or renamed) and secondarily by nested-value structure or a
    scalar type change when the full input was captured. This is
    high-precision: an error followed by an input-shape change is strong
    evidence the agent doesn't know the parameter format.

    Scanned directly from `tool_calls`, independent of the
    similarity-based retry detector -- a parameter-shape retry varies the
    input enough that it may not register as a `retry_loop` at all. Takes
    precedence over `stuck_pattern`, `retry_loop`, and
    `tool_error_sequence`: indices it claims are suppressed for those
    signals, because the `input_examples` fix is more specific and more
    actionable.

    When a subsequent call to the same tool succeeded, AgentFluent
    extracts that call's `input` dict and surfaces it as a paste-ready
    `input_examples` entry in the recommendation (informational only; the
    user copies it manually -- see D002). Adding `input_examples` to a
    tool definition improves accuracy from 72% to 90% on complex
    parameter handling (Anthropic benchmark).
  example: |
    Subagent 'general-purpose' retried tool 'mcp__github__create_issue' 3
    times with different parameter shapes before succeeding. First attempt
    failed with: 'validation error: missing required field "title"'.
  severity_range: warning
  threshold: 2+ consecutive same-tool calls; first errored; input shape changed
  recommendation_target: tools
  related: [retry_loop, stuck_pattern, tool_error_sequence, target_tools]

- name: permission_failure
  category: signal_type
  short: A tool result contained a permission-denied keyword.
  long: |
    Triggered when a subagent tool result matches one of: `permission
    denied`, `access denied`, `not allowed`, `blocked`. Emitted once per
    unique tool denied (not per call), so the recommendation maps to a
    single config change ("grant tool X"). Cross-cuts with
    `tool_error_sequence` -- both fire from the same evidence -- because
    the remediation surfaces are different (tool config vs. prompt
    fallback).

    **False-positive filter.** Two structural patterns suppress emission
    even when the keyword matches: a leading line-number prefix
    (`<n>\t...` from Read or `<n>:...` from Grep — successful tool
    output where the keyword appears in source code, not as an error),
    and a result truncated at the 500-char summary cap (file content,
    not a denial message). Both fail open — preferring suppression to
    spurious denials.
  example: "Subagent 'pm' was denied access to tool 'Write' ('permission denied')."
  severity_range: critical
  threshold: "keyword match: permission denied / access denied / not allowed / blocked"
  recommendation_target: tools
  related: [error_pattern, target_tools]

- name: error_pattern
  category: signal_type
  short: Free-text error keywords detected in an invocation's final output.
  long: |
    Lower-fidelity than the trace-level signals above. Scans `output_text`
    for `blocked`, `permission denied`, `failed`, `error`, `retry`, `unable
    to`, `not found`, `timed out`. Suppressed for any agent type that
    already has a trace-level signal -- trace evidence is strictly more
    informative than a keyword scan.
  example: "Agent 'pm' output contains 'unable to'."
  severity_range: critical for permission-denied keywords; warning otherwise
  threshold: output_text keyword scan
  recommendation_target: prompt
  related: [permission_failure, tool_error_sequence]

- name: model_mismatch
  category: signal_type
  short: |
    An agent's declared model is wrong for the complexity of its observed
    work.
  long: |
    Per-agent-type signal. Compares the agent's declared model family
    (`current_model`) against a complexity classification computed from
    its mean tool calls, mean tokens, error rate, and write-tool usage.
    Emits `overspec` when a complex model is doing simple work (potential
    savings) or `underspec` when a simple model is doing complex work
    (potential failures). Only fires when the agent has 3+ invocations and
    declares a model in its `.claude/agents/X.md` frontmatter.
  example: |
    Agent 'pm' is overspec'd: classified 'simple' but uses claude-opus-4-7.
    Estimated savings $0.42 across 11 invocations by switching to
    claude-haiku-4-5.
  severity_range: warning
  threshold: complexity_tier mismatch with declared model; min 3 invocations
  recommendation_target: model
  related: [complexity_tier, overspec, underspec, target_model]

- name: tool_orchestration_chain
  category: signal_type
  short: |
    An agent runs long tool-call chains whose large intermediate results
    pass through the context window unnecessarily.
  long: |
    Per-agent-type signal (Tier A, metadata-only). Flags invocations that
    make 10+ tool calls AND average more than 2,000 tokens per call -- a
    proxy for orchestration chains where each `tool_result` enters the
    context window even though only the final output is needed. Fires when
    3+ invocations of the same agent type match the pattern. Recommends
    Programmatic Tool Calling (`allowed_callers:
    ["code_execution_20250825"]`), which runs the orchestration in a
    code-execution sandbox so intermediate results stay out of context.
    Severity is `info`, not `warning`: the metadata-only proxy cannot tell
    a true chain (intermediates discarded) from an agent that legitimately
    needs each intermediate in context for reasoning. Estimated precision
    is 60-70%; this is the first LLM-call augmentation candidate (D035).
  example: |
    Agent 'general-purpose' made 47 tool calls consuming 132,000 tokens
    across 3 invocations. Average token cost per tool call: 2,809 tokens.
    Estimated savings ~48,840 tokens at the 37% benchmark by migrating to
    code-execution orchestration.
  severity_range: info
  threshold: "10+ tool calls AND >2000 tokens/call per invocation; min 3 invocations"
  recommendation_target: tools
  related: [token_outlier, target_tools, model_mismatch]

- name: mcp_unused_server
  category: signal_type
  short: An MCP server is configured but never called in observed sessions.
  long: |
    Triggered when an MCP server appears in `~/.claude.json` or
    `.mcp.json` but no tool calls reference it across the analyzed
    sessions. May be configured for projects you didn't analyze; consider
    the `info` severity. Cross-cutting signal -- `agent_type` is `null`
    since MCP servers aren't scoped to one agent.
  example: |
    MCP server 'slack' is configured in /home/u/.claude.json but has 0 tool
    calls across 10 analyzed sessions. Consider removing from mcpServers or
    marking as disabled.
  severity_range: info
  threshold: 0 calls across analyzed sessions
  recommendation_target: mcp
  related: [mcp_missing_server, target_mcp]

- name: mcp_missing_server
  category: signal_type
  short: An MCP server is called but not configured.
  long: |
    Triggered when observed tool calls reference an MCP server that isn't
    in any discovered MCP configuration. Often the result of a
    project-scoped server in a project you analyzed but is not the active
    project. Cross-cutting (`agent_type: null`).
  example: |
    Observed 5 calls to MCP server 'github' but it is not in any discovered
    MCP config. Add to ~/.claude.json or .mcp.json.
  severity_range: warning
  threshold: 1+ call to a non-configured server
  recommendation_target: mcp
  related: [mcp_unused_server, target_mcp]

- name: unused_agent
  category: signal_type
  short: |
    A custom agent is defined but the parent never delegates to it in the
    analyzed window.
  long: |
    Triggered when a custom `~/.claude/agents/<name>.md` (or project-scoped
    equivalent) is present in the config scanner output but `agent_type` has
    zero invocations across the analyzed sessions. Likely causes: the
    `description` doesn't match how the parent frames the task, the
    description is too narrow and only fires for an exact phrase, the
    triggering context (e.g., a failing test for a `tester` agent) isn't
    present in the window, or the parent has no awareness of the agent.
    Built-in agents (Explore, Plan, general-purpose, etc.) are excluded per
    D033 — their absence in any given window may be entirely normal. New
    agents added partway through the window will appear unused due to a
    partial-window confound; consider re-running after enough sessions
    accumulate.
  example: |
    Agent 'tester' is defined in /home/u/.claude/agents/tester.md but has 0
    invocations across 11 analyzed sessions.
  severity_range: info
  threshold: 0 invocations across analyzed sessions
  recommendation_target: description
  related: [target_description, mcp_unused_server]

- name: tool_inventory_oversized
  category: signal_type
  short: |
    An agent declares a large tool list (>30 tools) but exercises fewer than
    half of them in the analyzed window.
  long: |
    Triggered when a config-declared agent's `tools:` list (or an SDK
    agent's `allowed_tools`) exceeds 30 entries AND its utilization ratio
    — unique observed tools divided by declared tools — falls below 0.5.
    Observed tool diversity comes from `toolStats` on the agent's
    `toolUseResult` metadata, unioned across every invocation of that
    agent type. RAG-MCP (arXiv 2505.03275) places the tool-selection
    accuracy inflection point at ~30 tools (43% with retrieval vs 14%
    without); Anthropic's "Advanced Tool Use" article reports the Tool
    Search Tool lifts Opus 4.5 accuracy from 79.5% to 88.1% while
    preserving ~85% of the context window. Two suppression rules avoid
    false positives: agents whose declared list is a wildcard (`*`) are
    skipped (undefined denominator), and agents whose invocations carry
    no `toolStats` are skipped (observed diversity unknown, not zero).
    Scope is config-declared agents only — built-in agents (Explore,
    Plan, general-purpose) are excluded because there is no
    declared-tool-count data source for them.
  example: |
    Agent 'researcher' declares 42 tools but used only 9 unique tools
    (21% utilization) across 11 analyzed sessions.
  severity_range: info
  threshold: ">30 declared tools and <0.5 utilization ratio"
  recommendation_target: tools
  related: [unused_agent, token_outlier, target_tools]

- name: user_correction
  category: signal_type
  short: |
    The user interrupted or redirected the parent thread mid-flight ("no, do X
    instead", "wait, that's wrong", "revert").
  long: |
    Quality-axis signal (v0.6). High correction frequency in sessions
    without review subagents is evidence the parent would have benefited
    from independent review before committing to the wrong path.
    Detection uses a 3-tier heuristic to suppress false positives:

    1. **Strong-correction override** -- high-confidence phrases
       (`that's wrong`, `revert`, `undo`, `that's not what I`) fire
       regardless of preceding-message classification. These are
       corrections of reasoning, not answers to a question.
    2. **Primary gate** -- soft-correction patterns (negation,
       interruption, redirection, undo) only fire when the preceding
       assistant message contains a write-style `tool_use`. The user
       is correcting an *action*, not answering a question.
    3. **Question suppression** -- when the preceding assistant
       message ends with `?` AND has no write tools, soft patterns
       are suppressed (a "no" answer to "should I X?" is not a
       correction).

    Claude Code's system-injected wrappers (`<task-notification>`,
    `<system-reminder>`, session-resumption preamble, `Base directory
    for this skill:` skill metadata) are stripped before pattern
    matching to avoid trigger words inside non-prose content firing
    the signal. Calibrated against the dogfood corpus (#321, #330):
    post-fix false-positive rate is 0/2 detections.

    The signal `detail` carries the matched category (`strong` /
    `negation` / `interruption` / `redirection` / `undo`), the
    preceding-action classification (`write_tool` / `question` /
    `text_only`), the matched pattern, and a 140-char snippet.
  example: |
    User correction in parent thread: no, that's wrong -- we agreed
    not to delete anything in this pass.
  severity_range: warning
  threshold: |
    >= 2 corrections in the session OR correction rate >= 10% of user
    messages (OR-gated)
  recommendation_target: subagent
  related: [file_rework, reviewer_caught, primary_axis]

- name: file_rework
  category: signal_type
  short: |
    Same file edited at or above the calibrated threshold within a single
    session -- a missing-pre-implementation-review signal.
  long: |
    Quality-axis signal (v0.6). Heavy rework on one file in a single
    session usually indicates a feature shipped without a design pass
    that would have caught the structural issue earlier. Edit
    detection counts `Edit` / `Write` / `MultiEdit` calls against
    `file_path`; `Bash` and `NotebookEdit` are excluded by design (no
    clean `file_path` extraction).

    The signal `detail` carries `edit_count`, `post_completion_edits`
    (edits that landed after a completion-language phrase like
    "done" appeared in the session), `edit_tools` (which tools
    fired), and `completion_scope` (currently always `"session"` --
    per-file completion tracking is a future refinement).
  example: |
    File 'src/agentfluent/diagnostics/quality_signals.py' edited 14
    times in this session.
  severity_range: warning
  threshold: |
    `_FILE_REWORK_THRESHOLD` (currently 12) within a single session,
    calibrated to the p90 of the firing distribution
  recommendation_target: subagent
  related: [user_correction, reviewer_caught, primary_axis]

- name: reviewer_caught
  category: signal_type
  short: |
    A review-style subagent (architect, security-review, tester,
    code-reviewer) ran AND produced a substantive finding.
  long: |
    Quality-axis signal (v0.6). Per-agent attribution -- the signal
    carries the named review agent in `agent_type` so aggregation
    can group findings under each reviewer rather than lumping them
    globally. A review's response is "substantive" when the output
    is at least `_SUBSTANTIVE_RESPONSE_MIN_CHARS` (500) long AND
    mentions at least one finding-keyword (`blocker`, `issue`,
    `concern`, `must`, `should`, `warning`, `risk`, `vulnerability`,
    `fix`, `change needed`).

    The signal `detail` includes `finding_keywords` (the matched
    keywords, sorted), `parent_acted` (boolean for this single
    review), `response_length` (chars), `files_mentioned` (paths
    the review prose pointed at, extracted via a strict regex that
    excludes version strings and domain names), `files_acted_on`
    (the subset of mentioned files the parent edited within the
    next `_PARENT_ACTED_WINDOW=15` assistant messages), and (#396)
    the per-agent rate fields `parent_acted_count`, `total_findings`,
    `parent_acted_rate`, and `parent_acted_band`.

    `parent_acted` semantics (#322): review prose carries relative
    or bare paths (`src/foo.py` / `quality_signals.py`); `Edit` tool
    calls carry absolute paths (`/home/u/repo/src/foo.py`). The
    attribution uses suffix-match -- a mentioned token `m` matches
    an edited path `e` when `e == m` or `e.endswith("/" + m)` -- to
    bridge the relative-vs-absolute mismatch. Pre-fix this
    attribution was 0/51 on dogfood; post-fix 16/53 (30.2%).

    `parent_acted_band` semantics (#396): the per-(session,
    agent_type) `parent_acted_rate` (parent_acted_count /
    total_findings) is bucketed into a band:
    `below` (rate < `PARENT_ACTED_HEALTHY_BAND_LOW = 0.25`) --
    reviewer findings may be going unread; severity escalates to
    WARNING and the recommendation is actionable.
    `within` (0.25 <= rate <= `PARENT_ACTED_HEALTHY_BAND_HIGH = 0.75`)
    -- healthy review-and-reject collaboration; severity stays at
    INFO with no action item ("rejection of some findings is
    intentional, not a defect").
    `above` (rate > 0.75) -- high follow-through, reviewer is
    well-tuned; INFO with a "route more sessions" suggestion.

    A per-(session, agent_type) rate gate
    (`MIN_REVIEWER_CAUGHT_RATE = 0.5`) suppresses noisy reviewers --
    review agents whose substantive-finding fraction within a
    session falls below the gate don't surface their findings as
    signals.
  example: "`architect` review surfaced 3 finding-keyword(s)."
  severity_range: info-warning
  threshold: |
    Response >= 500 chars AND >= 1 finding keyword AND
    per-(session, agent_type) substantive rate >= MIN_REVIEWER_CAUGHT_RATE.
    Severity escalates from INFO to WARNING when parent_acted_rate
    falls below PARENT_ACTED_HEALTHY_BAND_LOW (0.25).
  recommendation_target: subagent
  related: [user_correction, file_rework, pr_review_comment_density, primary_axis]

- name: feat_fix_proximity
  category: signal_type
  short: |
    A `feat:` commit followed within a short window by `fix:` commits
    touching the same files -- evidence that the feature shipped with
    quality issues an independent reviewer might have caught.
  long: |
    Local-git quality-axis signal (v0.7). Off by default; runs only
    when the CLI passes `--git`. Scans the last 90 days of `git log`
    in the project's source directory for `feat:` commits, then for
    each one looks 7 days forward for any `fix:` commits that share
    at least 2 code files (excluding `.md`, `.yaml`, `.yml` paths,
    which co-edit frequently with unrelated commits). The threshold
    applies per fix, not on the union of all fixes for a feat. Each
    matched pair becomes one signal.

    Cross-cutting (`agent_type=None`). Severity branches on whether
    the originating session used a review-style subagent (architect,
    code-reviewer, tester, security-review): WARNING when no reviewer
    ran (strong "add review" signal), INFO when one ran (weaker --
    the reviewer was present but the issue slipped, so the
    recommendation pivots from "add a reviewer" to "audit the
    reviewer's coverage").

    Session correlation: AgentFluent picks the session whose last
    message timestamp most closely precedes the feat commit, then
    inspects its invocations. Commits made outside any analyzed
    session window yield `session_used_reviewer: null`.

    Subprocess invocation is bounded (30s timeout); missing git
    binary, non-repo dir, or empty window all silently skip the
    pipeline rather than raising.

    Calibrated on the agentfluent dogfood corpus (#402, v0.8):
    76.2% precision on a 21-pair sample after raising the per-fix
    code-overlap threshold from 1 to 2; baseline v0.7 thresholds
    yielded 58.8% on a 34-pair sample.
  example: "feat a1b2c3d followed by 2 fixes on shared file(s) within 3d"
  severity_range: info -> warning
  recommendation_target: subagent
  related: [user_correction, file_rework, reviewer_caught, ci_failure_first_push, pr_review_comment_density, primary_axis]

- name: pr_review_comment_density
  category: signal_type
  short: |
    External review comments per line changed exceeded the configured
    threshold — the PR pulled enough human-reviewer effort that an
    agent-side reviewer could plausibly have caught the issues
    pre-PR.
  long: |
    Tier 3 GitHub quality-axis signal (v0.8). Off by default; runs
    only when the CLI passes `--github` (which also requires
    `--diagnostics` and implies `--git`). For each PR touched by an
    analyzed session, AgentFluent fetches the PR detail
    (`/pulls/{N}`) to get `additions + deletions` and the PR author,
    then fetches the inline-review-comment list
    (`/pulls/{N}/comments`). Comments authored by the PR author are
    excluded (self-reviews don't count); the remaining "external"
    inline comments divided by `lines_changed` give the density.

    Cross-cutting (`agent_type=None`). Severity branches on density:
    `INFO` at the configured threshold (default 0.1, i.e. 1 comment
    per 10 lines changed), upgraded to `WARNING` at 2x the threshold
    (default 0.2). PRs with fewer than 20 lines changed are
    suppressed regardless of density — a single comment on a 3-line
    PR gives density 0.33, which would fire spuriously without the
    gate.

    Endpoint note: `gh api /pulls/{N}/comments` returns the inline
    review-comment list (one entry per file-level comment). The
    related `/pulls/{N}/reviews` endpoint returns review-level
    objects (state, body, user) without per-review inline counts, so
    AgentFluent skips it — counting inline comments directly is the
    cleaner shape for this signal.

    Rate-limit handling: if any `gh api` call returns 403/429 with a
    rate-limit signature OR a recoverable gh error (transient 5xx,
    malformed JSON), that PR is skipped and
    `DiagnosticsResult.tier3_degraded` is set to True. Other PRs
    still produce signals; the run still exits 0.

    Zero signals can be healthy. A `--github` run that fires no
    `pr_review_comment_density` signals is a valid, healthy outcome --
    not evidence the signal is broken. The threshold is built around
    external (non-author) inline review comments, so workflows that
    don't generate that density legitimately stay silent: solo-author
    PRs, PRs reviewed only by bots or agent-side reviewers (whose
    comments are agents, not the human reviewers the density was tuned
    for), and any repo where review happens out-of-band (pairing,
    pre-PR review). The load-bearing "did the enrichment actually run"
    flag is `tier3_degraded`: when it is False, the GitHub fetch
    completed cleanly and silence means "nothing crossed the
    threshold," not "diagnostics failed to compute." Distinguish "the
    signal didn't fire" (a finding about the workflow) from
    "enrichment degraded" (`tier3_degraded: true`, a finding about the
    fetch).
  example: "PR #42 ('Add window filter') received 12 external review comments across 80 lines changed (density: 0.15)"
  severity_range: info -> warning
  recommendation_target: subagent
  related: [ci_failure_first_push, feat_fix_proximity, reviewer_caught, primary_axis]

- name: ci_failure_first_push
  category: signal_type
  short: |
    A PR's first commit failed CI -- the agent shipped code that did
    not pass automated checks on first attempt, a direct quality miss.
  long: |
    Tier 3 GitHub quality-axis signal (v0.8). Off by default; runs
    only when the CLI passes `--github` (which also requires
    `--diagnostics` and implies `--git`). For each commit authored
    within an analyzed session window, AgentFluent fetches the PRs
    touching that commit via `gh api`, then for each unique PR
    fetches the first commit and its combined CI status. When the
    first commit's combined status is `failure` or `error`, one
    `CI_FAILURE_FIRST_PUSH` signal fires per PR.

    Cross-cutting (`agent_type=None`). Severity is always `warning`:
    a first-push CI failure is a definite quality miss, but signal
    strength varies with project conventions (some teams treat CI
    as the first-class check rather than a pre-commit gate).

    The signal is only emitted when the PR's first commit can be
    attributed to a session in the analysis window -- a first commit
    authored outside any analyzed session has no actionable
    attribution. Force-push caveat: `pulls/{N}/commits` returns the
    CURRENT first commit, so a PR that was force-pushed loses its
    historical first-push failure. Detecting the original first push
    would require the PR events API; deferred to v0.8.1+.

    Rate-limit handling: if any `gh api` call returns 403/429 with a
    rate-limit signature, that PR is skipped and
    `DiagnosticsResult.tier3_degraded` is set to True. Other PRs
    still produce signals; the run still exits 0.

    Zero signals can be healthy. A `--github` run that fires no
    `ci_failure_first_push` signals is a valid, healthy outcome -- not
    evidence the signal is broken. A "push only when local CI is
    green" workflow genuinely produces few or zero first-push CI
    failures, so a careful operator should expect silence here. The
    load-bearing "did the enrichment actually run" flag is
    `tier3_degraded`: when it is False, the GitHub fetch completed
    cleanly and silence means "no PR's first push failed CI," not
    "diagnostics failed to compute." Distinguish "the signal didn't
    fire" (a finding about the workflow) from "enrichment degraded"
    (`tier3_degraded: true`, a finding about the fetch).
  example: "PR #42 ('Add session window filter') first push failed CI: pytest failure"
  severity_range: warning
  recommendation_target: subagent
  related: [feat_fix_proximity, pr_review_comment_density, primary_axis]

# =============================================================================
# Severity
# =============================================================================

- name: critical
  category: severity
  short: |
    A finding that almost certainly indicates broken behavior -- the agent
    failed or is stuck.
  long: |
    Reserved for `stuck_pattern`, `permission_failure`,
    `tool_error_sequence` runs of 4+ errors, and `error_pattern` matches
    on permission-denial keywords. Critical findings are sorted to the top
    of the Recommendations table and rendered red.
  related: [warning, info]

- name: warning
  category: severity
  short: A finding worth investigating but not necessarily broken.
  long: |
    The default severity for outliers, retries, and short error sequences.
    Warning findings often resolve on their own (e.g., a retry that
    eventually succeeded) but warrant attention if they recur. Rendered
    yellow.
  related: [critical, info]

- name: info
  category: severity
  short: A passive observation -- usually a config-quality note.
  long: |
    Used for `mcp_unused_server` and most config-rubric recommendations.
    These don't indicate runtime problems; they suggest hygiene
    improvements. Rendered cyan.
  related: [warning, critical]

# =============================================================================
# Confidence tier
# =============================================================================

- name: high
  category: confidence_tier
  short: |
    Cluster is large or cohesive enough to confidently propose as a new
    subagent.
  long: |
    Triggered when **cluster_size >= 10 OR cohesion_score >= 0.50**. The
    YAML draft is rendered without a "review before use" caveat -- the
    cluster has enough internal similarity to read as a coherent task
    family.
  related: [cohesion_score, cluster_size, medium, low]

- name: medium
  category: confidence_tier
  short: Cluster is real but borderline -- review before promoting.
  long: |
    Triggered when **cohesion_score >= 0.35** but neither high-tier
    threshold is met. The YAML draft is offered as a starting point; the
    suggested name and prompt should be reviewed before saving the agent.
  related: [high, low]

- name: low
  category: confidence_tier
  short: Cluster is loose; the proposed subagent draft needs rework.
  long: |
    Triggered when neither size nor cohesion thresholds are met. The YAML
    draft includes a `# REVIEW BEFORE USE -- low confidence cluster`
    comment. Use the cluster as evidence that *some* coherent subset of
    work exists, not as a finished proposal.
  related: [high, medium, cohesion_score]

# =============================================================================
# Recommendation target
# =============================================================================

- name: target_prompt
  category: recommendation_target
  short: |
    Edit the agent's prompt body -- the markdown content below the
    frontmatter in `.claude/agents/<name>.md`.
  long: |
    Used for signals that suggest the agent's *instructions* are the
    problem: token outliers (broad exploration), retry loops (missing
    recovery guidance), error sequences (missing fallback). For built-in
    agents (which have no editable prompt), the recommendation pivots to
    either a wrapper subagent or a tighter delegation prompt -- see
    `concern_scope` and `concern_recovery`.
  aliases: [prompt]
  related: [target_tools, target_model, target_mcp]

- name: target_tools
  category: recommendation_target
  short: |
    Edit the agent's `tools:` list in frontmatter (or the `disallowedTools:`
    list).
  long: |
    Used for `permission_failure` (the agent needs access to a tool it
    doesn't have) and for token outliers when the agent has too many
    tools to choose from (>8 -> recommendation forks to `tools`). For
    built-in agents, see `concern_tools`.
  related: [target_prompt, permission_failure, concern_tools]

- name: target_model
  category: recommendation_target
  short: Change the agent's `model:` field in frontmatter.
  long: |
    Used for `model_mismatch` signals. Recommends `claude-haiku-4-5` when
    overspec'd, `claude-sonnet-4-6` when underspec'd. For built-in agents
    (model not configurable), pivots to "create a custom subagent with the
    recommended model" -- see `concern_model`.
  related: [model_mismatch, complexity_tier, overspec, underspec, concern_model]

- name: target_mcp
  category: recommendation_target
  short: Edit MCP server configuration in `~/.claude.json` or `.mcp.json`.
  long: |
    Used for `mcp_unused_server` (remove or disable) and
    `mcp_missing_server` (add the configuration). MCP recommendations
    carry `agent_type: null` since MCP servers aren't scoped to a single
    agent.
  aliases: [mcp]
  related: [mcp_unused_server, mcp_missing_server]

- name: target_description
  category: recommendation_target
  short: |
    Rewrite the agent's `description:` field in frontmatter -- the trigger
    logic the parent reads when deciding to delegate.
  long: |
    The `description` field is the only configuration surface the parent
    thread sees when deciding whether to delegate to a subagent. A
    misaligned, too-narrow, or vague description is the most common
    reason a defined agent is never invoked. Used for `unused_agent`:
    the recommendation surfaces the current description verbatim so the
    user can compare against typical parent phrasing for the task. The
    fix is to broaden, sharpen, or rewrite the description; accepting
    that the agent is unused for the analyzed workload is also a valid
    outcome.
  aliases: [description]
  related: [unused_agent]

# =============================================================================
# Built-in agent concern
# =============================================================================

- name: concern_scope
  category: agent_concern
  short: The agent's task scope is too broad.
  long: |
    Used for `token_outlier` and `duration_outlier` on built-in agents.
    The recommendation suggests: (a) a custom wrapper subagent that
    narrows the task, (b) a tighter delegation prompt passed to the
    built-in, or (c) rerouting to a different agent.
  aliases: [scope]
  related: [concern_recovery, concern_tools, concern_model]

- name: concern_recovery
  category: agent_concern
  short: The agent lacks error-recovery instructions.
  long: |
    Used for `retry_loop`, `tool_error_sequence`, `error_pattern` on
    built-in agents. The recommendation suggests adding retry bounds or
    exit conditions to the *delegating* agent's prompt (since the
    built-in itself isn't editable), or wrapping the call in a custom
    subagent that owns recovery logic.
  aliases: [recovery]
  related: [concern_scope, concern_tools]

- name: concern_tools
  category: agent_concern
  short: The agent's fixed tool set is wrong for the task.
  long: |
    Used for `permission_failure` on built-in agents. Suggests routing
    the task to a custom subagent with explicit tool grants, or
    confirming the built-in's fixed tool set is actually required.
  related: [permission_failure, target_tools]

- name: concern_model
  category: agent_concern
  short: The agent's fixed model is the wrong tier.
  long: |
    Used for `model_mismatch` on built-in agents. Suggests creating a
    custom subagent with the recommended model or rerouting to an
    existing custom agent that uses it.
  related: [model_mismatch, target_model]

# =============================================================================
# Cluster metrics
# =============================================================================

- name: cohesion_score
  category: cluster_metric
  short: Mean pairwise cosine similarity within a cluster (0.0-1.0).
  long: |
    Higher is more coherent. Real-world delegation prompts have enough
    free-text variance that cohesion rarely exceeds 0.5 even for
    recognizable task families. Empirically calibrated thresholds (#167):
    **>= 0.50** = high confidence, **>= 0.35** = medium, below = low. The
    metric is mean-pairwise rather than centroid-distance because clusters
    of 5-10 invocations are sensitive to centroid placement.
  example: |
    cohesion_score: 0.42 on a five-invocation cluster about "PR review
    prompts" -- solidly medium-confidence.
  related: [cluster_size, high, medium, low]

- name: cluster_size
  category: cluster_metric
  short: Number of invocations grouped into a cluster.
  long: |
    Larger clusters are more reliable signals of a recurring task family.
    **>= 10 invocations** is the high-confidence threshold; below
    `--min-cluster-size` (default **5**) the cluster is suppressed
    entirely (not enough evidence).
  example: "cluster_size: 12 -- confident enough to propose a new subagent based on size alone."
  related: [cohesion_score, high, medium, low]

# =============================================================================
# Model routing
# =============================================================================

- name: complexity_tier
  category: model_routing
  short: A 3-level classification of an agent's task complexity.
  long: |
    Computed from observed mean tool calls, mean tokens, error rate, and
    write-tool usage. Tiers map 1:1 to Claude model families:

    - **`simple`** -- `claude-haiku` family. Triggered when mean tool calls
      <= 5 AND mean tokens <= 2,000 AND no write tools.
    - **`moderate`** -- `claude-sonnet` family. Default tier when neither
      simple nor complex thresholds are met.
    - **`complex`** -- `claude-opus` family. Triggered when mean tool calls
      >= 10 OR mean tokens >= 5,000 OR error rate >= 0.20 OR write tools used.

    Calibration note (#140): these thresholds are pending multi-contributor
    validation. On v0.3 single-dataset calibration, every observed agent
    classified as "complex" -- the thresholds may be set too sensitive.
  related: [overspec, underspec, model_mismatch]

- name: overspec
  category: model_routing
  short: |
    The agent uses a more capable (more expensive) model than its complexity
    warrants.
  long: |
    A `simple`-tier agent declared on `claude-opus-4-7`, for example. The
    `model_mismatch` signal recommends switching to the classified tier's
    family with an estimated cost savings derived from the observed token
    volume.
  related: [underspec, complexity_tier, model_mismatch]

- name: underspec
  category: model_routing
  short: The agent uses a less capable model than its complexity warrants.
  long: |
    A `complex`-tier agent declared on `claude-haiku-4-5`, for example.
    May correlate with elevated `error_rate` or `retry_loop` signals on
    the same agent. No cost-savings estimate (upgrading to a higher tier
    costs *more*); the recommendation is purely about output quality.
  related: [overspec, complexity_tier, model_mismatch]

# =============================================================================
# Built-in agent types
# =============================================================================

- name: general-purpose
  category: builtin_agent_type
  short: |
    The default delegation agent. Most recurring `general-purpose` invocations
    in your sessions are clustering candidates -- these are tasks that probably
    deserve their own custom subagent.
  long: |
    See **delegation clustering** in the README for how AgentFluent groups
    these into proposed new subagents.

- name: explore
  category: builtin_agent_type
  short: |
    Codebase exploration. Read-only by design. Frequent token outliers here
    usually mean the delegation prompt is too open-ended.
  aliases: [Explore]

- name: plan
  category: builtin_agent_type
  short: |
    Planning agent -- produces step-by-step implementation plans without
    modifying state.
  aliases: [Plan]

- name: code-reviewer
  category: builtin_agent_type
  short: PR / diff review agent.

- name: statusline-setup
  category: builtin_agent_type
  short: Configures the Claude Code statusline.

- name: claude-code-guide
  category: builtin_agent_type
  short: |
    Documentation lookup for Claude Code itself (hooks, settings, MCP, etc.).

# =============================================================================
# Built-in tools
# =============================================================================

- name: Read
  category: builtin_tool
  short: Read a file by absolute path.

- name: Edit
  category: builtin_tool
  short: Targeted string-replacement edit on a file.

- name: Write
  category: builtin_tool
  short: Create or overwrite a file.

- name: Bash
  category: builtin_tool
  short: Run a shell command. State-changing; classified as a write tool.

- name: Grep
  category: builtin_tool
  short: Ripgrep-backed content search. Read-only.

- name: Glob
  category: builtin_tool
  short: File pattern match. Read-only.

- name: Agent
  category: builtin_tool
  short: |
    Delegate a subtask to a subagent. The `subagent_type` input names which
    agent.

- name: Task
  category: builtin_tool
  short: |
    Async task management (TaskCreate, TaskUpdate, TaskList, TaskGet, etc.).
  aliases: [TaskCreate, TaskUpdate, TaskList, TaskGet, TaskOutput, TaskStop]

- name: NotebookEdit
  category: builtin_tool
  short: Jupyter notebook cell edits. State-changing.

- name: WebFetch
  category: builtin_tool
  short: Fetch a URL.

- name: WebSearch
  category: builtin_tool
  short: Web search.

- name: Skill
  category: builtin_tool
  short: Invoke a slash-command-style skill.

- name: ExitPlanMode
  category: builtin_tool
  short: Transition out of plan mode.

- name: AskUserQuestion
  category: builtin_tool
  short: Pause and ask the user a structured question.

- name: ScheduleWakeup
  category: builtin_tool
  short: (Loop mode) schedule the next wake-up time.

- name: mcp_tool_namespace
  category: builtin_tool
  short: |
    MCP tools follow `mcp__<server>__<tool>` (e.g.,
    `mcp__github__create_issue`).
  long: |
    The server name segment can contain underscores; tool names can start
    with underscore. The first `__` after the `mcp__` prefix is the
    server/tool boundary. Not a closed enum -- MCP servers contribute
    additional namespaced tools at runtime.

# =============================================================================
# Diagnostics output fields
# =============================================================================

- name: priority_score
  category: diagnostics_field
  short: |
    Composite ranking score on each `aggregated_recommendation`.
    Higher = act on this first.
  long: |
    Combines four signals: severity rank, log-scaled occurrence count,
    estimated cost impact (for `target='model'` mismatches that carry
    a dollar savings figure), and a trace-evidence boost when the
    recommendation is grounded in subagent trace data instead of
    just metadata. The formula and weights are tunable, calibrated
    in `scripts/calibration/threshold_validation.ipynb`.

    The Recommendations table is sorted by `priority_score` descending,
    and a Top-N priority-fixes summary surfaces above the table so the
    highest-leverage changes are the first thing the reader sees. Use
    `--top-n N` to control summary depth, or `--top-n 0` to disable.

    Exposed on every row in `aggregated_recommendations[].priority_score`.
    `agentfluent diff` reports `priority_score_delta` on persisting rows
    so you can detect *quiet regression* — a finding that didn't change
    severity or occurrence count but climbed in priority because its
    cost contribution rose.
  example: |
    Top-N priority fixes:
      1. [critical] pm: tool_error_sequence (priority 23.4) — ...
      2. [warning]  general-purpose: model_mismatch (priority 18.7) — ...
  threshold: tunable; severity * 4 + log1p(count) * 2 + savings_usd / 5 + trace_boost

- name: offload_candidate
  category: diagnostics_field
  short: |
    A cluster of repeating tool-use patterns in the parent thread that
    could be moved to a cheaper subagent or skill.
  long: |
    Surfaced by the parent-thread offload pipeline (#189). Detects
    bursts of similar tool-call sequences in the main Claude Code
    thread, clusters them by tool-use shape and prompt similarity,
    estimates the cost saved by routing the cluster through a
    Haiku- or Sonnet-tier subagent instead of Opus, and proposes a
    draft definition. Two draft kinds emit: a `subagent_draft` for
    delegation patterns and a `skill_draft` for repeated invocation
    patterns that map cleanly to a slash command.

    The Offload Candidates CLI section ranks clusters by estimated
    monthly savings. JSON consumers read
    `data.diagnostics.offload_candidates`. Calibrated against
    real-world burst distributions; see
    `scripts/calibration/threshold_validation.ipynb`.

    Empty when scikit-learn isn't installed (the `agentfluent[clustering]`
    extra is required) or when no cluster cleared the minimum size.
  example: |
    Offload Candidates (potential savings: $42/mo):
      1. PR review (8 occurrences) → propose pr-review subagent (Haiku)

- name: delegation_suggestions_skipped_reason
  category: diagnostics_field
  short: |
    Names *why* `delegation_suggestions` is empty in JSON output.
  long: |
    `null` when suggestions are present. Otherwise one of:

    - `sklearn_not_installed` — the `agentfluent[clustering]` extra
      is not installed; the clustering pipeline was skipped entirely.
    - `insufficient_invocations` — sklearn is available but the count
      of clusterable general-purpose invocations is below
      `--min-cluster-size` (default 5).
    - `no_clusters_above_min_size` — clustering ran but produced no
      drafts. Either no cluster met the size threshold, or every
      draft was deduped against an existing agent config (cosine
      similarity above `--min-similarity`).

    Lets JSON consumers distinguish "feature unavailable" from "ran
    but found nothing" without inspecting the install or counting
    invocations themselves.
  example: |
    {"delegation_suggestions": [], "delegation_suggestions_skipped_reason": "insufficient_invocations"}

- name: origin
  category: diagnostics_field
  short: |
    On a `by_model` cost row, distinguishes parent-thread vs subagent
    contributions: `"parent"` or `"subagent"`.
  long: |
    Added in JSON schema v2 (#227). The Cost by Model breakdown is now
    a list of rows where each row carries an `origin` field. A model
    used by both the parent thread and a delegated subagent shows two
    rows — one per origin — instead of being aggregated into one.
    `total_cost` and `total_tokens` at the top level are comprehensive
    (parent + subagent), reflecting the true API spend for the
    session.

    `agentfluent diff` reads both v1 (legacy dict) and v2 (current
    list) envelopes via a compatibility shim. Legacy v1 rows
    normalize as `origin="parent"` so saved baselines remain diffable.
  example: |
    [
      {"model": "claude-opus-4-7", "origin": "parent",   "cost": 30.68},
      {"model": "claude-opus-4-7", "origin": "subagent", "cost":  1.50},
      {"model": "claude-opus-4-6", "origin": "subagent", "cost":  8.93}
    ]

- name: axis_scores
  category: diagnostics_field
  short: |
    Per-recommendation `{cost, speed, quality}` map of how strongly each
    diagnostics axis contributed to the row's `priority_score`. Annotation,
    not gating logic.
  long: |
    Added in v0.6 (D017 + D021). Every recommendation accumulates a
    score per axis based on which `SignalType`s drove it -- the
    mapping is pinned in `aggregation.SIGNAL_AXIS_MAP` and is
    single-axis per D022 (no cross-cutting). The map is exposed on
    `aggregated_recommendations[].axis_scores` so CI rules and
    downstream consumers can target a specific dimension (e.g. fail
    only on new `quality`-primary findings, or chart cost-axis trend
    across runs).

    `primary_axis` is derived from this map by picking the largest
    bucket; ties are broken by the `Axis(StrEnum)` declaration order
    (per D027).
  example: '{"cost": 0.0, "speed": 0.0, "quality": 14.0}'
  related: [primary_axis, priority_score, user_correction, file_rework, reviewer_caught]

- name: primary_axis
  category: diagnostics_field
  short: |
    The dominant diagnostics axis for a recommendation -- `"cost"`,
    `"speed"`, or `"quality"`. Drives the `[axis]` label that surfaces in
    CLI output and `agentfluent diff`.
  long: |
    Added in v0.6 (D022). Derived from `axis_scores` by picking the
    largest bucket. Tiebreaker is the `Axis(StrEnum)` declaration
    order: cost > speed > quality (D027), so a recommendation with
    purely-zero `axis_scores` lands as `cost` rather than producing
    ambiguous output.

    `agentfluent diff` reads pre-v0.6 envelopes that lack this field
    cleanly -- the absence is normalized to `"cost"`, preserving the
    existing comparison semantics for legacy baselines.
  example: |
    [quality] 7 user corrections in 3 sessions -- consider an architect
    agent for design review before implementation.
  related: [axis_scores, priority_score]

- name: quality_evidence_factor
  category: diagnostics_field
  short: |
    Multiplier on the `priority_score` term that boosts recommendations
    grounded in quality-axis signal evidence.
  long: |
    Added in v0.6 (D021). Mirrors the existing `trace_boost` mechanic
    on the cost/speed side: a recommendation gets `quality_evidence_factor *
    W_QUALITY` added to its `priority_score` when its `SignalType`s
    map to the `quality` axis. The factor is a unitless ratio in
    `[0, 1]` reflecting how much of the recommendation's underlying
    signal load is quality-axis evidence; `W_QUALITY` is the
    calibrated weight constant.

    The annotations approach (single additive term, axis scores
    computed post-hoc) was deliberately chosen over decomposing the
    formula into per-axis sub-formulas -- it preserves
    `priority_score` as a single comparable scalar across runs so
    `agentfluent diff` keeps working without a v3 envelope bump.
  related: [axis_scores, primary_axis, priority_score]

- name: window
  category: diagnostics_field
  short: |
    Top-level block on `analyze --json` output describing the date-range
    filter applied to the run.
  long: |
    Added in v0.6 (#298). Populated when `--since` / `--until` is
    supplied to `agentfluent analyze`; absent when neither is set.
    The `since` / `until` values are the *resolved absolute UTC
    bounds* the filter actually applied (relative inputs like
    `--since 7d` are resolved to a concrete timestamp before being
    written to the envelope), so a saved baseline records the
    absolute window even when generated with relative-form input.

    Counts let downstream consumers see filter cardinality without
    re-walking session metadata. `session_count_before_filter` is
    the project's total session count; `session_count_after_filter`
    is what fell inside `[since, until)` and was actually analyzed.
  example: |
    {
      "since": "2026-05-01T00:00:00+00:00",
      "until": null,
      "session_count_before_filter": 42,
      "session_count_after_filter": 12
    }

- name: scope_session
  category: diagnostics_field
  short: |
    Top-level field on `analyze --json` output naming the session
    filename when `--session` constrained the run; `null` otherwise.
  long: |
    Added in v0.7 (#357). When set, every metric and diagnostic in
    the envelope reflects exactly one session -- token/cost,
    recommendations, offload candidates, and quality signals all
    scope to the named file. Lets a downstream consumer confirm
    scope from a single field instead of re-counting
    `agent_metrics.by_agent_type` or `session_count`.

    Pair with the v0.7 breaking-change note in CHANGELOG: in v0.6
    `--session` scoped metrics but rolled diagnostics across the
    full project, which made `--session` + `--diagnostics` output
    misleading. v0.7 unifies the scope under one flag.
  example: '"scope_session": "session-abc123.jsonl"'
  related: [window, diagnostics_version]

- name: diagnostics_version
  category: diagnostics_field
  short: |
    Top-level field on `analyze --json` output stamping the
    AgentFluent version that produced the envelope.
  long: |
    Added in v0.7 (#347). `agentfluent diff` reads this from both
    baseline and current and emits a non-fatal warning when they
    differ -- so signal-count deltas don't conflate real behavior
    changes with detector-sensitivity changes between releases.
    Per D034, the warning is informational; `--strict` mode is
    deferred. Absent on pre-v0.7 envelopes; `diff` reads them
    cleanly and skips the warning.
  example: '"diagnostics_version": "0.7.0"'
  related: [scope_session, window]

# =============================================================================
# Session metrics
# =============================================================================

- name: model_turns
  category: session_metric
  short: |
    The number of model turns in a session -- one merged assistant
    message (one API round-trip).
  long: |
    Added in v0.9 (#465). A *model turn* is one merged assistant
    message: a single API round-trip the model took. The parser's
    fragment-merging step can combine several raw JSONL lines into one
    logical assistant message, so a turn is **not** "one JSONL line" --
    it is the merged message.

    Distinct from `tool_uses` and from tokens:

    - `tool_uses` counts *actions*. A single turn carries zero, one, or
      many `tool_use` blocks (parallel tool calls), so turns and tool
      calls are independent -- neither bounds the other.
    - tokens measure the *cost* of each turn.

    Turns are the headline efficiency metric: an agent that calls 10
    tools in 3 turns batches its work (efficient); one that calls 10
    tools in 10 turns serializes it (wasteful). Reducing turns for a
    fixed task while holding quality steady drops both cost and latency
    more than any single other change.

    Surfaced in the Token Usage table ("Model turns" row), in the
    verbose Per-Session Breakdown table ("Turns" column), and in
    `analyze --json` as `model_turns` per session plus
    `total_model_turns` aggregated across sessions at the envelope top
    level. Backed by the session's `assistant_message_count` field,
    which stays in the JSON output for backward compatibility.
  example: |
    Token Usage
      ...
      API calls      42
      Model turns    20
  related: [output, total_cost]

- name: active_duration
  category: session_metric
  short: |
    Wall-clock duration with detected idle (user-wait) gaps subtracted --
    an estimate of time the agent was actually working.
  long: |
    Added in v0.9 (#480; the underlying subtraction shipped in #230).
    Two duration measures exist for an agent invocation:

    - **wall-clock** (`duration_ms`) -- raw elapsed time from the parent's
      `toolUseResult` metadata. It silently includes any stretch where a
      tool call sat pending user approval while the user was away (the IDE
      prompting to allow a `Write`, an MCP call, etc.).
    - **active** (`active_duration_ms`) -- wall-clock minus detected idle
      gaps. AgentFluent flags a gap when it exceeds
      `max(10 × median, 5 minutes)` within a subagent trace and subtracts
      it. Available only when a subagent trace is linked (~80% of the
      dogfood corpus); without one, only wall-clock exists.

    Why the distinction matters: for an interactive agent like `pm`, the
    wall-clock average can be tens of minutes per call while the active
    time is seconds -- almost all of the gap is the user thinking, not the
    agent working. The `analyze` summary table renders
    `active (wall)` per call over the trace-linked subset and highlights
    rows whose wall/active ratio exceeds 3×, so a high wall-clock number
    no longer reads as a duration problem.

    Note the denominator: the summary table reports duration **per call**,
    whereas `duration_outlier` detection operates on
    `active_duration_per_tool_use` -- active time **per tool call** -- a
    finer-grained basis that isolates slow individual tool calls. The two
    are not interchangeable; a high per-call active duration with a normal
    per-tool_use figure just means the invocation made many tool calls.
  example: |
    Agent Invocations
      pm   ...   470.0s (2918.0s wall)†   <- active 470s/call, wall 2918s/call
  related: [model_turns, duration_outlier]

# =============================================================================
# Comparison row status (agentfluent diff)
# =============================================================================

- name: new
  category: diff_status
  short: |
    A recommendation present in the current run but not the baseline.
  long: |
    `agentfluent diff` keys recommendations by
    `(agent_type, target, frozenset(signal_types))`. A row is
    classified `new` when that key appears in the current envelope
    but not the baseline. `--fail-on {info|warning|critical}` gates
    exit code 3 on any `new` row at or above the chosen severity, so
    a CI check can fail on regression without needing per-row
    bookkeeping.

    Only `new` rows count against `--fail-on` in v0.5; persisting-row
    `priority_score` increases are deferred to v0.6's
    `--fail-on priority-regression` mode.
  example: |
    Recommendations diff: 2 new, 1 resolved, 5 persisting
    [new] critical pm: stuck_pattern — ...

- name: resolved
  category: diff_status
  short: |
    A recommendation present in the baseline but not the current run —
    a fix landed.
  long: |
    Same keying as `new` (the `(agent_type, target, signal_types)`
    tuple). A row is `resolved` when the baseline emitted it but the
    current run no longer does. Surfaces wins from prompt edits,
    tool-allowlist tightenings, and model swaps. Does not count
    against `--fail-on`.
  example: |
    [resolved] warning architect: model_mismatch — already fixed

- name: persisting
  category: diff_status
  short: |
    A recommendation present in both runs. Carries `count_delta` and
    `priority_score_delta` so a CI consumer can detect quiet movement.
  long: |
    Persisting rows surface count drift (the same finding firing more
    or fewer times than baseline) and priority drift (the
    `priority_score` climbed because cost impact rose, even though
    severity and count stayed the same). The deltas are exposed on
    each persisting row as `count_delta` and `priority_score_delta`
    so a downstream gate can flag *quiet regression* — a finding
    that's getting worse without crossing a discrete threshold.
  example: |
    [persisting] warning pm: tool_error_sequence (count_delta=+2, priority_score_delta=+4.1)

# =============================================================================
# CLI commands
#
# Navigation index, not vocabulary. Sibling-command entries are
# intentionally short-only -- the README and `--help` carry the
# full reference. `report` gets the full treatment because the
# command was added in v0.7 and its relationship to `analyze --json`
# is the most common point of confusion.
# =============================================================================

- name: report
  category: cli_command
  short: |
    Renders an `analyze --json` snapshot envelope as a Markdown
    document suitable for PR comments, CI artifacts, or a checked-in
    review trail.
  long: |
    Added in v0.7 (D031). `report` is a separate subcommand rather
    than `analyze --format markdown` because the two concerns --
    session ingestion and presentation -- benefit from being
    composable. The intended workflow is two steps:

    ```bash
    agentfluent analyze --project P --json > snap.json
    agentfluent report snap.json > report.md
    ```

    Snapshots round-trip through file storage, PR comments, and CI
    artifact pipelines without re-running analysis. The Markdown
    layout follows D030 section ordering: Summary, Token Metrics,
    Agent Metrics, Diagnostics, Offload Candidates (when at least one
    candidate has positive estimated savings), and a Reproduction
    footer that includes the original command line.

    `report` accepts only `analyze` envelopes in v0.7. A `diff`
    envelope renderer is the v0.8 follow-up flagged in
    `prd-v0.7.md` OQ3 -- the dispatch table in `report.py` is
    structured so adding it is a one-line change.

    Stdout is the default sink; pass `--output report.md` (or `-o`)
    to write to a file instead. Exit code 1 on user errors (missing
    file, invalid JSON, unsupported envelope command).
  example: |
    agentfluent analyze --project codefluent --json > snap.json
    agentfluent report snap.json --output report.md
  related: [analyze, diff]

- name: analyze
  category: cli_command
  short: |
    Primary analysis command. Reads session JSONL for a project,
    computes token/cost/agent metrics, and (default) runs the
    diagnostics pipeline. Output is a Rich table by default or a
    versioned `{version, command, data}` JSON envelope under
    `--format json` / `--json`.

- name: diff
  category: cli_command
  short: |
    Compares two `analyze --json` envelopes side-by-side: new,
    resolved, and persisting recommendations plus token/cost and
    per-agent invocation deltas. Pair with `--fail-on` to gate a
    CI check on regressions.

- name: config-check
  category: cli_command
  short: |
    Scans `~/.claude/agents/*.md` and `./.claude/agents/*.md`,
    parses each agent's YAML frontmatter and body, and scores it
    against a 4-dimension rubric (description trigger quality, tool
    access, model selection, prompt completeness). Independent of
    session data.

- name: explain
  category: cli_command
  short: |
    Terminal-native glossary lookup. `agentfluent explain
    <term>` prints the same definition that appears in this
    document; `--list` enumerates every term grouped by category.
    The source of truth is `src/agentfluent/glossary/terms.yaml`.

- name: list
  category: cli_command
  short: |
    Enumerates the projects discovered under `~/.claude/projects/`
    (or `--claude-config-dir`) and the session JSONL files within a
    given project. The starting point when you don't yet know which
    `--project` slug to pass to `analyze`.
