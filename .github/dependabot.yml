version: 2
updates:
  # Python deps (uv / pip ecosystem resolves pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      pip-patch-minor:
        update-types:
          - "minor"
          - "patch"
      pip-major:
        update-types:
          - "major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      actions-patch-minor:
        update-types:
          - "minor"
          - "patch"
      actions-major:
        update-types:
          - "major"
